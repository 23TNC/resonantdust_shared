services:
  check:
    image: clockworklabs/spacetime:latest
    volumes:
      - .:/workspace/wasm
    working_dir: /workspace/wasm
    entrypoint: ["cargo"]
    command: ["check", "--workspace", "--all-targets"]

  build:
    image: clockworklabs/spacetime:latest
    volumes:
      - .:/workspace/wasm
    working_dir: /workspace/wasm
    entrypoint: ["cargo"]
    command: ["build", "--workspace", "--release"]

  test:
    image: clockworklabs/spacetime:latest
    volumes:
      - .:/workspace/wasm
    working_dir: /workspace/wasm
    entrypoint: ["cargo"]
    command: ["test", "--workspace"]

  # Corpus acceptance: parse every content `.rd`, build one symbol table, then
  # validate + resolve each file. Mounts the repo root so the crate (wasm/) and
  # the content (content/data) are both visible. The load-bearing cross-file
  # lint — catches renames, missing art, duplicate/dangling `$` refs.
  corpus:
    image: clockworklabs/spacetime:latest
    volumes:
      - ..:/workspace
    working_dir: /workspace/wasm
    entrypoint: ["cargo"]
    command: ["run", "--quiet", "-p", "resonantdust-data", "--bin", "corpus", "--", "/workspace/content/data"]

  # Builds the JS/wasm bundle the pixijs client imports.
  #
  # We bypass wasm-pack and call `cargo build` + `wasm-bindgen` directly —
  # wasm-pack 0.14 still passes `cargo build --out-dir`, which cargo 1.92+
  # renamed to the unstable `--artifact-dir`, breaking on stable.
  #
  # wasm-bindgen-cli isn't in the spacetime image; first run installs it
  # under target/wasm-tools (gitignored, persists via the host mount).
  # The CLI version must match the wasm-bindgen version in Cargo.lock.
  wasm:
    image: clockworklabs/spacetime:latest
    volumes:
      - .:/workspace/wasm
    working_dir: /workspace/wasm
    environment:
      PATH: /workspace/wasm/target/wasm-tools/bin:/usr/local/cargo/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      WASM_BINDGEN_VERSION: "0.2.122"
    entrypoint: ["bash", "-euo", "pipefail", "-c"]
    command:
      - |
        if ! command -v wasm-bindgen >/dev/null 2>&1; then
          cargo install wasm-bindgen-cli \
            --version "$$WASM_BINDGEN_VERSION" \
            --root /workspace/wasm/target/wasm-tools \
            --locked
        fi
        cargo build --target wasm32-unknown-unknown --features js --release
        wasm-bindgen \
          target/wasm32-unknown-unknown/release/resonantdust_wasm.wasm \
          --target web \
          --out-dir pkg
